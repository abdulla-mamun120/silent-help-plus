<section class="auth-section" id="register">
    <div class="container">
        <div class="section-header">
            <span class="section-badge">Get Started</span>
            <h2 class="section-title">Create Your Account</h2>
            <p class="section-subtitle">Join thousands of students already benefiting from Silent Help Plus</p>
        </div>

        <div class="auth-container">

            <div class="auth-form-container">
                <h3>Register</h3>
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control">
                    </div>
                </form>
            </div>

            <div class="auth-form-container" id="login">
                <h3>Login</h3>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" class="form-control">
                    </div>
                </form>
            </div>

        </div>
    </div>
</section>
