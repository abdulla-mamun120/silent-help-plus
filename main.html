<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Help Plus</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main CSS (imports all files) -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

<div id="app"></div>

<script>
async function load(file){
    let res = await fetch("components/" + file);
    return await res.text();
}

async function init(){
    document.getElementById("app").innerHTML =
        await load("loading.html") +
        await load("navbar.html") +
        await load("hero.html") +
        await load("statistics.html") +
        await load("about.html") +
        await load("features.html") +
        await load("how-it-works.html") +
        await load("why-choose.html") +
        await load("testimonials.html") +
        await load("preview.html") +
        await load("faq.html") +
        await load("auth.html") +
        await load("contact.html") +
        await load("newsletter.html") +
        await load("footer.html");
}
init();
</script>

<script type="module" src="js/index.js"></script>

</body>
</html>
